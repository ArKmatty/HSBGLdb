name: Patch Notes Sync

on:
  schedule:
    # Daily at 6pm UTC
    - cron: '0 18 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh-patch-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger patch notes refresh
        run: |
          RESPONSE=$(curl -s -L -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/refresh-patch-notes")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Patch notes refresh failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Patch notes refreshed successfully"
