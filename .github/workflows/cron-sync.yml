name: Leaderboard Sync

on:
  schedule:
    # Every 30 minutes (well within GitHub Actions free tier)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger leaderboard sync
        run: |
          echo "=== Debug Info ==="
          echo "SITE_URL: ${{ secrets.SITE_URL }}"
          echo "CRON_SECRET present: ${{ secrets.CRON_SECRET != '' && 'yes' || 'no' }}"
          echo ""

          echo "=== Calling API ==="
          FULL_URL="${{ secrets.SITE_URL }}/api/cron/sync"
          echo "URL: $FULL_URL"

          RESPONSE=$(curl -v -L -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$FULL_URL" 2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo ""
          echo "=== Response ==="
          echo "HTTP Code: $HTTP_CODE"
          echo "Body: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Sync failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Warm cache after sync
        if: success()
        run: |
          echo "=== Warming cache ==="
          WARM_URL="${{ secrets.SITE_URL }}/api/warm-cache"

          WARM_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "$WARM_URL" 2>&1)

          WARM_HTTP=$(echo "$WARM_RESPONSE" | tail -n1)
          WARM_BODY=$(echo "$WARM_RESPONSE" | sed '$d')

          echo "Warm cache HTTP: $WARM_HTTP"
          echo "Response: $WARM_BODY"

      - name: Report failure to GitHub Issues
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="Sync failed at $(date -u '+%Y-%m-%d %H:%M UTC')"

          # Check for recent open issue to avoid spam
          EXISTING=$(gh issue list \
            --label "cron-failure" \
            --state open \
            --limit 1 \
            --json title \
            --jq '.[0].title // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --body "Sync failed again.\n\nRun: $RUN_URL"
          else
            gh issue create \
              --title "$TITLE" \
              --body "Leaderboard sync failed.\n\nRun: $RUN_URL" \
              --label "cron-failure"
          fi
